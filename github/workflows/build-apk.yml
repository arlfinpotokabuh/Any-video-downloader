name: Build Android APK from AI Studio Web

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js 24
      uses: actions/setup-node@v4
      with:
        node-version: '24'

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Inisialisasi Proyek Web AI Studio
      run: |
        # Mengisi package.json dasar jika belum ada
        if [ ! -f package.json ]; then
          npm init -y
        fi
        
        # Menginstal pustaka pendukung web rilis secara otomatis
        npm install
        
        # Mencoba melakukan kompilasi proyek React/Next/Vite jika ada skrip build
        npm run build --if-present

        # Membuat folder dist untuk pembungkus Android
        mkdir -p dist
        
        # Strategi 1: Jika kompilasi menghasilkan folder build/out/dist, pindahkan isinya
        if [ -d "out" ]; then cp -r out/* dist/ 2>/dev/null || true; fi
        if [ -d "build" ] && [ "build" != "dist" ]; then cp -r build/* dist/ 2>/dev/null || true; fi
        if [ -d ".next" ]; then cp -r .next/* dist/ 2>/dev/null || true; fi
        
        # Strategi 2: Salin file statis yang ada di folder utama ke dist
        cp *.html dist/ 2>/dev/null || true
        cp *.css dist/ 2>/dev/null || true
        cp *.js dist/ 2>/dev/null || true
        cp -r public/* dist/ 2>/dev/null || true
        
        # Strategi 3 (Proteksi): Jika index.html tetap tidak ada, buat file index.html otomatis 
        # agar Capacitor tidak crash dan aplikasi web tetap bisa berjalan lewat script js utama.
        if [ ! -f dist/index.html ]; then
          echo '<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>AI Studio App</title></head><body><div id="root"></div><div id="app"></div><script src="index.js"></script><script src="main.js"></script><script src="bundle.js"></script></body></html>' > dist/index.html
          # Cari file js utama dan salin ke dist jika ada di folder luar
          FILE_JS=$(find . -maxdepth 1 -name "*.js" -not -name "package*.js" | head -n 1)
          if [ -n "$FILE_JS" ]; then cp "$FILE_JS" dist/index.js; fi
        fi

    - name: Pasang Dependency Kompilasi
      run: |
        npm install @capacitor/core @capacitor/cli @capacitor/android

    - name: Konfigurasi Pembungkus Android
      run: |
        npx cap init "AI Studio App" "com.aistudio.myapp" --web-dir=dist
        npx cap add android

    - name: Sinkronisasi Berkas Web ke Android
      run: npx cap sync android

    - name: Build APK via Gradle
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ai-studio-apk
        path: android/app/build/outputs/apk/debug/app-debug.apk
