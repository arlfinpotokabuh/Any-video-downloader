name: Build Android APK from AI Studio Web

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js 24
      uses: actions/setup-node@v4
      with:
        node-version: '24'

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Inisialisasi Proyek Web AI Studio
      run: |
        if [ ! -f package.json ]; then
          npm init -y
        fi
        
        mkdir -p dist
        
        # Cari file HTML apa pun di seluruh folder proyek untuk dijadikan halaman utama
        FILE_HTML_ASLI=$(find . -name "*.html" -not -path "./dist/*" | head -n 1)
        
        if [ -n "$FILE_HTML_ASLI" ]; then
          echo "Menemukan file HTML utama di: $FILE_HTML_ASLI"
          # Ambil folder tempat file HTML itu berada
          FOLDER_ASLI=$(dirname "$FILE_HTML_ASLI")
          # Salin seluruh isi folder tersebut ke folder dist rilis
          cp -r $FOLDER_ASLI/* dist/ 2>/dev/null || true
          # Pastikan file HTML utamanya diganti nama menjadi index.html di dalam folder dist
          cp "$FILE_HTML_ASLI" dist/index.html
        else
          echo "Peringatan: Tidak ada file HTML ditemukan. Membuat halaman index.html darurat."
          echo '<h1>AI Studio App</h1>' > dist/index.html
        fi

    - name: Pasang Dependency Kompilasi
      run: |
        npm install @capacitor/core @capacitor/cli @capacitor/android

    - name: Konfigurasi Pembungkus Android
      run: |
        npx cap init "AI Studio App" "com.aistudio.myapp" --web-dir=dist
        npx cap add android

    - name: Sinkronisasi Berkas Web ke Android
      run: npx cap sync android

    - name: Build APK via Gradle
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ai-studio-apk
        path: android/app/build/outputs/apk/debug/app-debug.apk
