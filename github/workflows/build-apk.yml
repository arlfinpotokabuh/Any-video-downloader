name: Build Android APK from AI Studio Web

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Memaksa sistem menggunakan standar Node.js 24 tahun 2026

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js 24
      uses: actions/setup-node@v4
      with:
        node-version: '24'

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Inisialisasi Proyek Web AI Studio
      run: |
        # Membuat file package.json otomatis jika belum ada
        if [ ! -f package.json ]; then
          npm init -y
        fi
        
        # Membuat folder penampung aplikasi web
        mkdir -p dist
        
        # Menyalin file html, css, js ke folder dist dengan aman tanpa memicu error loop
        cp *.html dist/ 2>/dev/null || true
        cp *.css dist/ 2>/dev/null || true
        cp *.js dist/ 2>/dev/null || true
        cp -r assets dist/ 2>/dev/null || true
        cp -r src dist/ 2>/dev/null || true
        
        # Buat file index.html tiruan jika proyek kosong agar build tidak crash
        if [ ! -f dist/index.html ]; then
          echo '<h1>AI Studio App</h1>' > dist/index.html
        fi

    - name: Pasang Dependency Kompilasi
      run: |
        npm install @capacitor/core @capacitor/cli @capacitor/android

    - name: Konfigurasi Pembungkus Android
      run: |
        npx cap init "AI Studio App" "com.aistudio.myapp" --web-dir=dist
        npx cap add android

    - name: Sinkronisasi Berkas Web ke Android
      run: npx cap sync android

    - name: Build APK via Gradle
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ai-studio-apk
        path: android/app/build/outputs/apk/debug/app-debug.apk
