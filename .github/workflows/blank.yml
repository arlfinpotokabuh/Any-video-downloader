name: Build Android APK from AI Studio Web

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Inisialisasi Proyek Web AI Studio
      run: |
        # Membuat file package.json otomatis jika belum ada di proyek
        if [ ! -f package.json ]; then
          npm init -y
        fi
        
        # Membuat folder dist dan memindahkan seluruh file web ke dalamnya
        mkdir -p dist
        find . -maxdepth 1 -type f -not -name "package.json" -not -name "README.md" -exec cp {} dist/ \;
        cp -r assets dist/ 2>/dev/null || true
        cp -r src dist/ 2>/dev/null || true

    - name: Pasang Dependency Kompilasi
      run: |
        npm install @capacitor/core @capacitor/cli @capacitor/android

    - name: Konfigurasi Pembungkus Android
      run: |
        # Mengatur Capacitor secara otomatis tanpa menu interaktif
        npx cap init "AI Studio App" "com.aistudio.myapp" --web-dir=dist
        npx cap add android

    - name: Sinkronisasi Berkas Web ke Android
      run: npx cap sync android

    - name: Build APK via Gradle
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ai-studio-apk
        path: android/app/build/outputs/apk/debug/app-debug.apk
