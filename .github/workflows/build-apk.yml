name: Build Android APK from Web App

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Install Dependencies
      run: npm install

    - name: Build Web Project
      run: |
        npm run build --if-present
        # Membuat folder dist tiruan jika proyek tidak menghasilkan folder build bawaan
        mkdir -p dist
        cp -r . dist/ || true

    - name: Install & Configure Capacitor
      run: |
        npm install @capacitor/core @capacitor/cli
        npx cap init "AI Studio App" "com.aistudio.myapp" --web-dir=dist
        npm install @capacitor/android
        npx cap add android

    - name: Sync Code to Android
      run: npx cap sync android

    - name: Build APK via Gradle
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleRelease

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: web-release-apk
        path: android/app/build/outputs/apk/release/app-release-unsigned.apk
