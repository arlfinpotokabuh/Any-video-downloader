name: Build Android APK from AI Studio Web

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js 24
      uses: actions/setup-node@v4
      with:
        node-version: '24'

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '21'

    - name: Pasang Pustaka dan Dependency AI Studio
      run: |
        if [ ! -f package.json ]; then
          npm init -y
        fi
        
        # Bersihkan sisa cache agar folder fresh
        rm -rf dist build out .next android capacitor.config.json index.html
        
        # Install dependency asli proyek
        npm install --legacy-peer-deps
        
        # Install library pembungkus Android
        npm install @capacitor/core @capacitor/cli @capacitor/android

    - name: Pemindaian dan Fabrikasi index.html Darurat AI Studio
      run: |
        node -e "
        const fs = require('fs');
        const path = require('path');

        // 1. Fungsi melacak file HTML
        function findHtmlFiles(dir, fileList = []) {
          const files = fs.readdirSync(dir);
          files.forEach(file => {
            const filePath = path.join(dir, file);
            if (fs.statSync(filePath).isDirectory()) {
              if (file !== 'node_modules' && !file.startsWith('.')) {
                findHtmlFiles(filePath, fileList);
              }
            } else if (file.endsWith('.html')) {
              fileList.push(filePath);
            }
          });
          return fileList;
        }

        const allHtmlFiles = findHtmlFiles(process.cwd());
        let rootIndexExists = fs.existsSync(path.join(process.cwd(), 'index.html'));

        // 2. JIKA SAMA SEKALI TIDAK ADA FILE HTML (Kasus Khas AI Studio Terkini)
        if (allHtmlFiles.length === 0) {
          console.log('⚠️ Deteksi repositori tanpa file HTML fisik. Memulai perakitan template entry point...');
          
          // Cari file JavaScript utama yang menjadi motor penggerak React Anda
          const searchPaths = [
            'src/main.tsx', 'src/index.tsx', 'src/main.jsx', 'src/index.jsx',
            'src/index.js', 'src/app.tsx', 'src/App.tsx', 'main.tsx'
          ];
          
          let mainJsFile = '';
          for (const sp of searchPaths) {
            if (fs.existsSync(path.join(process.cwd(), sp))) {
              mainJsFile = sp;
              break;
            }
          }

          if (!mainJsFile) {
            // Fallback: Cari file tsx/jsx acak di dalam folder src jika tidak ketemu di jalur standar
            if (fs.existsSync(path.join(process.cwd(), 'src'))) {
              const srcFiles = fs.readdirSync(path.join(process.cwd(), 'src'));
              const jsFile = srcFiles.find(f => f.endsWith('.tsx') || f.endsWith('.jsx') || f.endsWith('.ts') || f.endsWith('.js'));
              if (jsFile) mainJsFile = 'src/' + jsFile;
            }
          }

          console.log('🟢 Mengunci modul JavaScript utama: ' + (mainJsFile || 'Tidak terdeteksi, menggunakan fallback generic'));

          // Bangun file index.html standar Vite React di root folder
          const scriptTag = mainJsFile ? '<script type=\"module\" src=\"/' + mainJsFile + '\"></script>' : '<script type=\"module\" src=\"/src/main.tsx\"></script>';
          const htmlTemplate = '<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n  <meta charset=\"UTF-8\" />\n  <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\" />\n  <title>Any Video Downloader</title>\n</head>\n<body>\n  <div id=\"root\"></div>\n  <div id=\"app\"></div>\n  ' + scriptTag + '\n</body>\n</html>';
          
          fs.writeFileSync(path.join(process.cwd(), 'index.html'), htmlTemplate, 'utf8');
          console.log('🟢 Perakitan index.html sukses dilakukan di folder root!');
        } else {
          // Jika ada file HTML tapi bersembunyi di subfolder, salin ke root agar Vite tidak bingung
          const detectedHtml = allHtmlFiles.find(f => f.toLowerCase().includes('index.html')) || allHtmlFiles[0];
          if (detectedHtml && !rootIndexExists) {
            fs.copyFileSync(detectedHtml, path.join(process.cwd(), 'index.html'));
            console.log('💡 Menduplikasi berkas ' + detectedHtml + ' ke root folder.');
          }
        }

        // 3. Konfigurasi ulang base path pada file vite.config agar menggunakan jalur relatif (Anti-Blank)
        const viteFiles = ['vite.config.js', 'vite.config.ts'];
        for (const file of viteFiles) {
          if (fs.existsSync(file)) {
            let content = fs.readFileSync(file, 'utf8');
            content = content.replace(/root\s*:\s*['\"].*?['\"],?/g, ''); // Hapus pembatasan root folder
            if (!content.includes('base:')) {
              content = content.replace('defineConfig({', \"defineConfig({\n  base: './',\");
            }
            fs.writeFileSync(file, content, 'utf8');
            console.log('🟢 Parameter konfigurasi Vite sukses diperbarui pada ' + file);
            break;
          }
        }
        "

    - name: Eksekusi Kompilasi Web AI Studio
      run: |
        # Jalankan kompilasi web berbasis Vite lokal dengan jaminan file index.html sudah di posisi
        if ./node_modules/.bin/vite build; then
          echo "🟢 Kompilasi via Vite Binary sukses!"
        elif npx vite build; then
          echo "🟢 Kompilasi via Vite CLI sukses!"
        elif npm run build --if-present; then
          echo "🟢 Kompilasi via NPM run build sukses!"
        else
          echo "⚠️ Proses kompilasi gagal, mengaktifkan mode salin berkas manual..."
          mkdir -p dist
          cp -r * dist/ 2>/dev/null || true
          rm -rf dist/node_modules dist/dist
        fi

    - name: Validasi Akhir Folder Output
      run: |
        # Konsolidasi struktur agar folder 'dist' siap menampung index.html hasil build
        if [ ! -d "dist" ]; then
          if [ -d "build" ]; then mv build dist; fi
          if [ -d "out" ]; then mv out dist; fi
        fi
        mkdir -p dist
        if [ ! -f dist/index.html ] && [ -f index.html ]; then
          cp index.html dist/index.html
        fi

    - name: Inisialisasi Pembungkus Android
      run: |
        npx cap init "Any Video Downloader" "com.aistudio.anyvideodownloader" --web-dir=dist
        npx cap add android

    - name: Suntik Izin Akses Internet & Penyimpanan Galeri
      run: |
        MANIFEST_PATH="android/app/src/main/AndroidManifest.xml"
        if [ -f "$MANIFEST_PATH" ]; then
          sed -i '/<\/manifest>/i \    <uses-permission android:name="android.permission.INTERNET" \/>' $MANIFEST_PATH
          sed -i '/<\/manifest>/i \    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" \/>' $MANIFEST_PATH
          sed -i '/<\/manifest>/i \    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" \/>' $MANIFEST_PATH
          sed -i '/<\/manifest>/i \    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" \/>' $MANIFEST_PATH
          sed -i 's/<application/<application android:usesCleartextTraffic="true"/g' $MANIFEST_PATH
          echo "🟢 Manifes Android sukses dikonfigurasi dengan izin penuh!"
        fi

    - name: Sinkronisasi Berkas Web ke Android
      run: npx cap sync android

    - name: Build APK via Gradle
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ai-studio-apk
        path: android/app/build/outputs/apk/**/*.apk
