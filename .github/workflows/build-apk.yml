name: Build Android APK from AI Studio Native

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Pasang Ulang Gradle Wrapper Resmi (Anti-Corrupt)
      run: |
        gradle wrapper --gradle-version 8.5 --distribution-type all

    - name: Berikan Izin Eksekusi Gradle
      run: chmod +x gradlew

    - name: Kompilasi APK dengan Pelacak Error Mendalam
      # 🟢 BARU: Menambahkan flag untuk memaksa Gradle membongkar letak error kodenya
      run: ./gradlew assembleDebug --stacktrace --info

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ai-studio-apk
        path: app/build/outputs/apk/debug/*.apk
