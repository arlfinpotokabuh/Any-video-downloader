name: Build Android APK from AI Studio Web

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js 24
      uses: actions/setup-node@v4
      with:
        node-version: '24'

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '21'

    - name: Pasang Pustaka dan Dependency AI Studio
      run: |
        if [ ! -f package.json ]; then
          npm init -y
        fi
        
        # Bersihkan sisa-sisa cache lama
        rm -rf dist build out .next android capacitor.config.json
        
        # Pasang dependensi bawaan proyek
        npm install --legacy-peer-deps
        
        # Pasang library pembungkus Android
        npm install @capacitor/core @capacitor/cli @capacitor/android

    - name: Pemindaian Menyeluruh Berkas Proyek AI Studio
      run: |
        node -e "
        const fs = require('fs');
        const path = require('path');

        // Fungsi rekursif untuk mencari file .html di semua subfolder (kecuali node_modules)
        function findHtmlFiles(dir, fileList = []) {
          const files = fs.readdirSync(dir);
          files.forEach(file => {
            const filePath = path.join(dir, file);
            if (fs.statSync(filePath).isDirectory()) {
              if (file !== 'node_modules' && !file.startsWith('.')) {
                findHtmlFiles(filePath, fileList);
              }
            } else if (file.endsWith('.html')) {
              fileList.push(filePath);
            }
          });
          return fileList;
        }

        console.log('⏳ Memulai pemindaian mendalam lokasi index.html...');
        const allHtmlFiles = findHtmlFiles(process.cwd());
        console.log('Daftar file HTML yang ditemukan:', allHtmlFiles);

        let sourceHtml = '';
        // Cari file yang mengandung kata index.html atau ambil file html pertama yang ditemukan
        const targetHtml = allHtmlFiles.find(f => f.toLowerCase().includes('index.html')) || allHtmlFiles[0];

        if (targetHtml) {
          sourceHtml = targetHtml;
          console.log('🟢 Berhasil mengunci file HTML sumber aplikasi: ' + sourceHtml);
          
          // Jika posisinya bukan di root, duplikat ke root folder agar Vite v8 tidak gagal memuat entri
          const rootDest = path.join(process.cwd(), 'index.html');
          if (sourceHtml !== rootDest) {
            fs.copyFileSync(sourceHtml, rootDest);
            console.log('💡 Sukses menyalin berkas utama ke folder root.');
          }
        } else {
          console.log('⚠️ Tidak menemukan file HTML apa pun di repositori Anda!');
        }

        // 2. Memastikan konfigurasi vite.config.js / ts dipaksa menggunakan jalur relatif
        const viteFiles = ['vite.config.js', 'vite.config.ts'];
        for (const file of viteFiles) {
          if (fs.existsSync(file)) {
            let content = fs.readFileSync(file, 'utf8');
            
            // Hapus aturan pembatasan folder root jika ada agar pelacakan tidak terkunci
            content = content.replace(/root\s*:\s*['\"].*?['\"],?/g, '');
            
            if (!content.includes('base:')) {
              content = content.replace('defineConfig({', \"defineConfig({\n  base: './',\");
            }
            fs.writeFileSync(file, content, 'utf8');
            console.log('🟢 Konfigurasi Vite berhasil diselaraskan pada ' + file);
            break;
          }
        }
        "

    - name: Eksekusi Kompilasi Web AI Studio
      run: |
        # Mencoba menjalankan kompilasi murni menggunakan Vite local/global
        if npx vite build; then
          echo "🟢 Kompilasi via Vite lokal berhasil dilakukan!"
        elif ./node_modules/.bin/vite build; then
          echo "🟢 Kompilasi via Vite binary berhasil dilakukan!"
        elif npm run build; then
          echo "🟢 Kompilasi via npm run build berhasil dilakukan!"
        else
          echo "⚠️ Gagal kompilasi otomatis. Membuat penanganan khusus untuk proyek statis..."
          mkdir -p dist
          # Menyalin seluruh file statis dari root ke folder dist jika proyek Anda hanya HTML/JS murni
          cp -r * dist/ 2>/dev/null || true
          rm -rf dist/node_modules dist/dist
        fi

    - name: Validasi Akhir Folder Output
      run: |
        # Memastikan hasil kompilasi web terkonsolidasi di folder 'dist'
        if [ ! -d "dist" ]; then
          if [ -d "build" ]; then mv build dist; fi
          if [ -d "out" ]; then mv out dist; fi
        fi
        mkdir -p dist
        # Jika index.html tidak ada di dist, salin dari root folder yang sudah diamankan tadi
        if [ ! -f dist/index.html ] && [ -f index.html ]; then
          cp index.html dist/index.html
        fi

    - name: Inisialisasi Pembungkus Android
      run: |
        npx cap init "Any Video Downloader" "com.aistudio.anyvideodownloader" --web-dir=dist
        npx cap add android

    - name: Suntik Izin Akses Internet & Penyimpanan Galeri
      run: |
        MANIFEST_PATH="android/app/src/main/AndroidManifest.xml"
        if [ -f "$MANIFEST_PATH" ]; then
          sed -i '/<\/manifest>/i \    <uses-permission android:name="android.permission.INTERNET" \/>' $MANIFEST_PATH
          sed -i '/<\/manifest>/i \    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" \/>' $MANIFEST_PATH
          sed -i '/<\/manifest>/i \    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" \/>' $MANIFEST_PATH
          sed -i '/<\/manifest>/i \    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" \/>' $MANIFEST_PATH
          sed -i 's/<application/<application android:usesCleartextTraffic="true"/g' $MANIFEST_PATH
          echo "🟢 Manifes Android sukses dikonfigurasi dengan izin penuh!"
        fi

    - name: Sinkronisasi Berkas Web ke Android
      run: npx cap sync android

    - name: Build APK via Gradle
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ai-studio-apk
        path: android/app/build/outputs/apk/**/*.apk
