name: Build Android APK from AI Studio Web

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js 24
      uses: actions/setup-node@v4
      with:
        node-version: '24'

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '21'

    - name: Pasang Pustaka dan Dependency AI Studio
      run: |
        if [ ! -f package.json ]; then
          npm init -y
        fi
        
        # Bersihkan folder sampah dari run sebelumnya agar tidak merusak cache
        rm -rf dist build out .next android capacitor.config.json
        
        # Instalasi dependensi bawaan AI studio
        npm install --legacy-peer-deps
        
        # Pasang pustaka Capacitor
        npm install @capacitor/core @capacitor/cli @capacitor/android

    - name: Pemindaian Lokasi dan Injeksi Konfigurasi Vite
      run: |
        node -e "
        const fs = require('fs');
        const path = require('path');

        console.log('🔍 Memulai pemindaian berkas index.html...');
        
        // 1. Cari di mana posisi file index.html asli proyek berada
        const targets = ['index.html', 'src/index.html', 'public/index.html', 'app/index.html'];
        let foundPath = '';
        for (const target of targets) {
          if (fs.existsSync(path.join(process.cwd(), target))) {
            foundPath = target;
            console.log('🟢 Menemukan index.html asli di jalur: ' + target);
            break;
          }
        }

        // Jika index.html tersembunyi di folder dalam (misal src/), bawa keluar ke root agar Vite tidak error
        if (foundPath && foundPath !== 'index.html') {
          fs.copyFileSync(path.join(process.cwd(), foundPath), path.join(process.cwd(), 'index.html'));
          console.log('💡 Menduplikasi index.html ke root folder untuk kelancaran kompilasi Vite.');
        }

        // 2. Modifikasi atau paksa isi file vite.config agar menggunakan base path relatif (Anti-Blank)
        const viteFiles = ['vite.config.js', 'vite.config.ts'];
        for (const file of viteFiles) {
          if (fs.existsSync(file)) {
            let content = fs.readFileSync(file, 'utf8');
            
            // Hapus rule pembatasan root: 'src' jika itu yang merusak pencarian berkas
            if (content.includes(\"root:\")) {
              content = content.replace(/root\s*:\s*['\"].*?['\"],?/g, '');
            }
            
            // Suntikkan base relatif './' ke dalam konfigurasi Vite
            if (!content.includes('base:')) {
              content = content.replace('defineConfig({', \"defineConfig({\n  base: './',\");
            }
            
            fs.writeFileSync(file, content, 'utf8');
            console.log('🟢 Sukses menyelaraskan konfigurasi pada ' + file);
            break;
          }
        }
        "

    - name: Eksekusi Kompilasi Web AI Studio
      run: |
        # Menjalankan build resmi proyek menggunakan vite secara langsung
        if npx vite build; then
          echo "🟢 Kompilasi Vite sukses!"
        elif npm run build; then
          echo "🟢 Kompilasi NPM run build sukses!"
        else
          echo "❌ Semua metode kompilasi web gagal total! Membuat proteksi berkas..."
          mkdir -p dist
          echo '<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>AI Studio App</title></head><body><div id="root"></div><div id="app"></div><script type="module" src="/src/main.tsx"></script></body></html>' > dist/index.html
        fi

    - name: Validasi Akhir Folder Output
      run: |
        # Memastikan hasil output kompilasi berada di folder 'dist'
        if [ ! -d "dist" ]; then
          if [ -d "build" ]; then mv build dist; fi
          if [ -d "out" ]; then mv out dist; fi
        fi
        mkdir -p dist
        if [ ! -f dist/index.html ]; then
          cp index.html dist/index.html 2>/dev/null || echo '<!DOCTYPE html><html><body><div id="root"></div></body></html>' > dist/index.html
        fi

    - name: Inisialisasi Pembungkus Android
      run: |
        npx cap init "Any Video Downloader" "com.aistudio.anyvideodownloader" --web-dir=dist
        npx cap add android

    - name: Suntik Izin Akses Internet & Penyimpanan Galeri
      run: |
        MANIFEST_PATH="android/app/src/main/AndroidManifest.xml"
        if [ -f "$MANIFEST_PATH" ]; then
          sed -i '/<\/manifest>/i \    <uses-permission android:name="android.permission.INTERNET" \/>' $MANIFEST_PATH
          sed -i '/<\/manifest>/i \    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" \/>' $MANIFEST_PATH
          sed -i '/<\/manifest>/i \    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" \/>' $MANIFEST_PATH
          sed -i '/<\/manifest>/i \    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" \/>' $MANIFEST_PATH
          sed -i 's/<application/<application android:usesCleartextTraffic="true"/g' $MANIFEST_PATH
          echo "🟢 Manifes Android sukses dikonfigurasi dengan izin penuh!"
        fi

    - name: Sinkronisasi Berkas Web ke Android
      run: npx cap sync android

    - name: Build APK via Gradle
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ai-studio-apk
        path: android/app/build/outputs/apk/**/*.apk
