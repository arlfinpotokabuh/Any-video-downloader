name: Build Android APK from AI Studio Native

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '21'

    - name: Pasang Ulang Gradle Wrapper Resmi (Anti-Corrupt)
      run: |
        gradle wrapper --gradle-version 9.3.1 --distribution-type all

    # 🟢 BARU: Dekode kunci debug.keystore agar Gradle bisa menandatangani paket APK Anda
    - name: Ekstrak Keystore Debug Aplikasi
      run: |
        if [ -f debug.keystore.base64 ]; then
          base64 -d debug.keystore.base64 > debug.keystore
          echo "🟢 Berhasil merakit berkas debug.keystore asli!"
        else
          echo "⚠️ debug.keystore.base64 tidak ditemukan, membuat keystore debug darurat..."
          keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
        fi

    - name: Berikan Izin Eksekusi Gradle
      run: chmod +x gradlew

    - name: Kompilasi APK Asli (Android Native)
      run: ./gradlew assembleDebug -Dorg.gradle.jvmargs="-Xmx2048m -XX:MaxMetaspaceSize=512m"

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ai-studio-apk
        path: app/build/outputs/apk/debug/*.apk
