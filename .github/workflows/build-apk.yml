name: Build Android APK from AI Studio Native

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '21' # 🟢 Dinaikkan ke Java 21 untuk mendukung stabilitas Kotlin & Gradle modern

    - name: Pasang Ulang Gradle Wrapper Resmi (Anti-Corrupt)
      run: |
        gradle wrapper --gradle-version 8.5 --distribution-type all

    - name: Berikan Izin Eksekusi Gradle
      run: chmod +x gradlew

    - name: Kompilasi APK Asli (Android Native)
      # 🟢 Menambahkan opsi penanganan memori (-Dorg.gradle.jvmargs) agar proses compile tidak kehabisan RAM di runner
      run: ./gradlew assembleDebug -Dorg.gradle.jvmargs="-Xmx2048m -XX:MaxMetaspaceSize=512m"

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ai-studio-apk
        path: app/build/outputs/apk/debug/*.apk
