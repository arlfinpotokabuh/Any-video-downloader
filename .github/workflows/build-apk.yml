name: Build Android APK from AI Studio Native

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17' # Proyek Kotlin/Gradle umumnya sangat stabil di JDK 17

    - name: Setup Gradle Cache
      uses: actions/setup-gradle@v4

    - name: Berikan Izin Eksekusi Gradle
      run: chmod +x gradlew

    - name: Kompilasi APK Asli (Android Native)
      run: ./gradlew assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ai-studio-apk
        path: app/build/outputs/apk/debug/*.apk
