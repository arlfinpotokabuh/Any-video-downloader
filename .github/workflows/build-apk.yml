name: Build Android APK from AI Studio Web

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js 24
      uses: actions/setup-node@v4
      with:
        node-version: '24'

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '21'

    - name: Pasang Pustaka dan Dependency AI Studio
      run: |
        # Reset package jika rusak
        if [ ! -f package.json ]; then
          npm init -y
        fi
        
        # Bersihkan folder dist/build lama agar tidak terjadi penumpukan cache data
        rm -rf dist build out .next android capacitor.config.json
        
        # Instalasi bersih dengan dukungan penuh package lock
        npm install --legacy-peer-deps
        
        # Wajib pasang core Capacitor secara global & lokal di runner
        npm install @capacitor/core @capacitor/cli @capacitor/android

    - name: Amankan Konfigurasi Vite & Eksekusi Build Web
      run: |
        node -e "
        const fs = require('fs');
        const path = require('path');

        // 1. Paksa file vite.config agar menggunakan base relatif './' (Anti-Blank)
        const viteFiles = ['vite.config.js', 'vite.config.ts'];
        for (const file of viteFiles) {
          if (fs.existsSync(file)) {
            let content = fs.readFileSync(file, 'utf8');
            if (!content.includes('base:')) {
              content = content.replace('defineConfig({', \"defineConfig({\n  base: './',\");
              fs.writeFileSync(file, content, 'utf8');
              console.log('🟢 Sukses mengonfigurasi Base Path ke arah Relatif pada ' + file);
            }
            break;
          }
        }

        // 2. Jalankan kompilasi utama proyek AI Studio
        try {
          console.log('⏳ Sedang memproses kompilasi proyek web AI Studio...');
          require('child_process').execSync('npm run build', { stdio: 'inherit' });
        } catch (e) {
          console.log('⚠️ Build standar gagal, menggunakan metode fallback kompilasi...');
          try {
            // Beberapa proyek AI studio menggunakan skrip alternatif
            require('child_process').execSync('npx vite build', { stdio: 'inherit' });
          } catch(err) {
            console.error('❌ Semua metode kompilasi web gagal total!');
            process.exit(1);
          }
        }

        // 3. Konsolidasi folder output agar terbaca oleh Capacitor
        const distPath = path.join(process.cwd(), 'dist');
        const buildPath = path.join(process.cwd(), 'build');
        const outPath = path.join(process.cwd(), 'out');

        if (!fs.existsSync(distPath)) {
          if (fs.existsSync(buildPath)) {
            fs.renameSync(buildPath, distPath);
            console.log('🟢 Memindahkan folder build ke dist');
          } else if (fs.existsSync(outPath)) {
            fs.renameSync(outPath, distPath);
            console.log('🟢 Memindahkan folder out ke dist');
          } else {
            console.error('❌ Folder hasil build web tidak ditemukan!');
            process.exit(1);
          }
        }

        // Verifikasi akhir keberadaan file index.html asli
        if (!fs.existsSync(path.join(distPath, 'index.html'))) {
          console.error('❌ index.html asli proyek web tidak ditemukan di folder output!');
          process.exit(1);
        } else {
          console.log('💪 BERHASIL: index.html asli dari AI Studio siap dibungkus!');
        }
        "

    - name: Inisialisasi Pembungkus Android
      run: |
        npx cap init "Any Video Downloader" "com.aistudio.anyvideodownloader" --web-dir=dist
        npx cap add android

    - name: Suntik Izin Akses Internet & Jaringan APK
      run: |
        MANIFEST_PATH="android/app/src/main/AndroidManifest.xml"
        if [ -f "$MANIFEST_PATH" ]; then
          # Membuka gerbang jaringan internet Android Manifest secara paksa
          sed -i '/<\/manifest>/i \    <uses-permission android:name="android.permission.INTERNET" \/>' $MANIFEST_PATH
          sed -i '/<\/manifest>/i \    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" \/>' $MANIFEST_PATH
          sed -i '/<\/manifest>/i \    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" \/>' $MANIFEST_PATH
          sed -i '/<\/manifest>/i \    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" \/>' $MANIFEST_PATH
          
          # bypass security agar link HTTP/HTTPS downloader tidak diblokir system
          sed -i 's/<application/<application android:usesCleartextTraffic="true"/g' $MANIFEST_PATH
          echo "🟢 Manifes Android sukses dikonfigurasi dengan izin penuh!"
        fi

    - name: Sinkronisasi Berkas Web ke Android
      run: npx cap sync android

    - name: Build APK via Gradle
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ai-studio-apk
        path: android/app/build/outputs/apk/**/*.apk
