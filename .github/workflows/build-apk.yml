name: Build Android APK from AI Studio Web

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js 24
      uses: actions/setup-node@v4
      with:
        node-version: '24'

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '21'

    - name: Pasang Pasukan Dependency
      run: |
        if [ ! -f package.json ]; then
          npm init -y
        fi
        npm install
        npm install @capacitor/core @capacitor/cli @capacitor/android

    - name: Paksa Pembuatan Folder dist dan index.html via Node.js
      run: |
        node -e "
        const fs = require('fs');
        const path = require('path');
        
        try {
          require('child_process').execSync('npm run build --if-present', { stdio: 'inherit' });
        } catch (e) {}

        const distPath = path.join(process.cwd(), 'dist');
        
        if (!fs.existsSync(distPath)) {
          fs.mkdirSync(distPath, { recursive: true });
        }
        
        const files = fs.readdirSync(process.cwd());
        files.forEach(file => {
          if (['.html', '.js', '.css'].includes(path.extname(file)) && !file.startsWith('package') && !file.startsWith('capacitor')) {
            try { fs.copyFileSync(file, path.join(distPath, file)); } catch(e) {}
          }
        });

        const indexPath = path.join(distPath, 'index.html');
        if (!fs.existsSync(indexPath)) {
          const htmlContent = '<!DOCTYPE html><html><head><meta charset=\"UTF-8\"><meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\"><title>AI Studio App</title></head><body><div id=\"root\"></div><div id=\"app\"></div><script src=\"index.js\"></script></body></html>';
          fs.writeFileSync(indexPath, htmlContent, 'utf8');
          console.log('🟢 Sukses membuat file proteksi dist/index.html secara mutlak!');
        }
        "

    - name: Inisialisasi dan Konfigurasi Capacitor
      run: |
        rm -rf android
        rm -f capacitor.config.json
        npx cap init "AI Studio App" "com.aistudio.myapp" --web-dir=dist
        npx cap add android

    - name: Sinkronisasi Berkas Web ke Android
      run: npx cap sync android

    - name: Build APK via Gradle
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ai-studio-apk
        path: android/app/build/outputs/apk/**/*.apk # 🟢 Mengamankan pencarian lokasi berkas APK
