name: Build Android APK from AI Studio Native

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '21' # Tetap di Java 21 karena Gradle 9+ wajib menggunakan Java versi tinggi

    - name: Pasang Ulang Gradle Wrapper Resmi (Anti-Corrupt)
      run: |
        # 🟢 VERSI DIPERBARUI: Mengunduh Gradle versi 9.3.1 untuk mendukung plugin AGP 9.1.1 proyek Anda
        gradle wrapper --gradle-version 9.3.1 --distribution-type all

    - name: Berikan Izin Eksekusi Gradle
      run: chmod +x gradlew

    - name: Kompilasi APK Asli (Android Native)
      run: ./gradlew assembleDebug -Dorg.gradle.jvmargs="-Xmx2048m -XX:MaxMetaspaceSize=512m"

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ai-studio-apk
        path: app/build/outputs/apk/debug/*.apk
